<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<table>

{% for person_id, races in main_dict.items() %}
    <tr>
        <td>{{ person_id }}|</td>
        {% for x in races %}
            <td>{{ x.result_person.result_time }}</td>
            <td>{{ x.result_person.result_place }}</td>
            <td>{{ x.result_person.scores }}</td>
            <td>{{ x.result_person.distance }}</td>
            <td> | </td>
        {% endfor %}
    </tr>
{% endfor %}

</table>
</body>
</html>
